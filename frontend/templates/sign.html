{% extends "base.html" %}
{% block title %}Sinh chữ ký | {{ app_name }}{% endblock %}
{% block content %}

<section class="grid lg:grid-cols-[1.05fr_0.95fr] gap-8">
  <div class="bg-white rounded-[28px] p-8 shadow-soft thin-border">
    <h1 class="text-4xl font-black text-tluBlue">Sinh chữ ký số</h1>
    <p class="text-slate-600 mt-3 leading-8">Đóng dấu tài liệu an toàn bằng thuật toán bảo mật cao</p>

    <form id="sign-form" class="mt-8 space-y-6">
      <div>
        <label class="block font-semibold mb-2">Chọn dữ liệu cần ký</label>
        <div class="flex gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="input_mode" value="file" checked> Tải tệp lên
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="input_mode" value="text"> Tự nhập văn bản
          </label>
        </div>
      </div>
      
      <div id="file-input">
        <label class="block font-semibold mb-2">Tệp tài liệu (PDF)</label>
        <input type="file" name="message_file" class="w-full rounded-2xl border border-slate-200 bg-[#eef3fb] px-4 py-4">
      </div>
      
      <div id="text-input" class="hidden">
        <label class="block font-semibold mb-2">Nội dung văn bản</label>
        <textarea name="message_text" rows="5" class="w-full rounded-2xl border border-slate-200 bg-[#eef3fb] px-4 py-4" placeholder="Nhập nội dung bạn muốn đóng dấu..."></textarea>
      </div>
      
      <button type="submit" class="w-full rounded-2xl bg-tluBlue text-white font-bold px-6 py-4 hover:bg-tluBlue2 transition shadow-md">
        <i class="fa-solid fa-pen-nib mr-2"></i> Tạo chữ ký
      </button>
    </form>
  </div>

  <div class="bg-white rounded-[28px] p-8 shadow-soft thin-border">
    <h2 class="text-3xl font-black text-tluBlue">Kết quả</h2>
    <div id="sign-result" class="mt-6 text-slate-500">Chưa có dữ liệu.</div>
  </div>
</section>

<script>
const textDiv = document.getElementById('text-input');
const fileDiv = document.getElementById('file-input');
const textArea = document.querySelector('textarea[name="message_text"]');
const fileInput = document.querySelector('input[name="message_file"]');

document.querySelectorAll('input[name="input_mode"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    if (e.target.value === 'text') {
      textDiv.classList.remove('hidden'); fileDiv.classList.add('hidden'); fileInput.value = '';
    } else {
      textDiv.classList.add('hidden'); fileDiv.classList.remove('hidden'); textArea.value = '';
    }
  });
});

document.getElementById('sign-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const result = document.getElementById('sign-result');
  result.innerHTML = `<div class="text-tluBlue font-semibold"><i class="fa-solid fa-circle-notch animate-spin mr-2"></i> Hệ thống đang mã hóa tài liệu...</div>`;

  const formData = new FormData(e.target);

  try {
    const res = await fetch('/api/sign', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok || !data.success) {
      result.innerHTML = `
      <div class="p-5 bg-red-50 border border-red-100 rounded-xl text-red-600 font-semibold mt-4">
        <i class="fa-solid fa-circle-exclamation mr-2"></i> ${data.error}
      </div>`;
      return;
    }

    result.innerHTML = `
    <div class="mt-4 p-6 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-sm">
      <p class="font-black text-xl text-emerald-800 mb-4">✔ Ký tài liệu thành công</p>

      <div class="text-[13px] font-mono bg-white/70 p-4 rounded-xl break-all space-y-3 text-slate-700 shadow-sm">
        <p class="flex justify-between border-b border-slate-200 pb-2"><strong class="text-slate-500">Dung lượng:</strong> <span>${data.signature_size} bytes</span></p>
        <p class="flex justify-between border-b border-slate-200 pb-2"><strong class="text-slate-500">Thời gian:</strong> <span>${data.sign_time_ms} ms</span></p>
        <p class="border-b border-slate-200 pb-2"><strong class="text-slate-500 block mb-1">Mã nhận diện (Digest):</strong> <span class="text-emerald-700">${data.integrity_digest_hex.substring(0, 32)}...</span></p>
        <p><strong class="text-slate-500 block mb-1">Chữ ký cấu thành:</strong>
          ${data.artifact.signatures.map(s => `<span class="block bg-slate-100 p-1 rounded mt-1">- [${s.alg.toUpperCase()}] Key ID: ${s.kid}</span>`).join('')}
        </p>
      </div>

      <div class="flex gap-3 mt-6">
        <a href="${data.download_url}" download class="flex-1 bg-tluBlue text-white px-4 py-3 rounded-xl text-center text-sm font-bold hover:bg-tluBlue2 transition shadow-md">
          <i class="fa-solid fa-file-signature mr-2"></i>Tải Tệp Chữ Ký
        </a>
        <a href="${data.download_pub_url}" download class="flex-1 bg-emerald-600 text-white px-4 py-3 rounded-xl text-center text-sm font-bold hover:bg-emerald-700 transition shadow-md">
          <i class="fa-solid fa-key mr-2"></i>Tải Khóa (Pub)
        </a>
      </div>
    </div>`;
  } catch (err) {
    result.innerHTML = `<div class="text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation mr-2"></i> Lỗi kết nối đến máy chủ</div>`;
  }
});
</script>
{% endblock %}
