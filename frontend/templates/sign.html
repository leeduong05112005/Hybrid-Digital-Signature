{% extends "base.html" %}
{% block title %}Sinh chữ ký | {{ app_name }}{% endblock %}
{% block content %}

<section class="grid lg:grid-cols-[1.05fr_0.95fr] gap-8">
  <div class="bg-white rounded-[28px] p-8 shadow-soft thin-border">
    <h1 class="text-4xl font-black text-tluBlue">Sinh chữ ký số</h1>
    <p class="text-slate-600 mt-3 leading-8">Tạo chữ ký số bằng thuật toán Hybrid (Ed25519 + Dilithium2)</p>

    <form id="sign-form" class="mt-8 space-y-6">
      <div>
        <label class="block font-semibold mb-2">Chọn dữ liệu ký</label>
        <div class="flex gap-6">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="input_mode" value="file" checked> Tải file
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="input_mode" value="text"> Nhập văn bản
          </label>
        </div>
      </div>
      
      <div id="file-input">
        <label class="block font-semibold mb-2">Tải file</label>
        <input type="file" name="message_file" class="w-full rounded-2xl border border-slate-200 bg-[#eef3fb] px-4 py-4">
      </div>
      
      <div id="text-input" class="hidden">
        <label class="block font-semibold mb-2">Nội dung văn bản</label>
        <textarea name="message_text" rows="5" class="w-full rounded-2xl border border-slate-200 bg-[#eef3fb] px-4 py-4" placeholder="Nhập nội dung cần ký..."></textarea>
      </div>
      
      <button type="submit" class="w-full rounded-2xl bg-tluBlue text-white font-bold px-6 py-4 hover:bg-tluBlue2 transition">
        Tạo chữ ký
      </button>
    </form>
  </div>

  <div class="bg-white rounded-[28px] p-8 shadow-soft thin-border">
    <h2 class="text-3xl font-black text-tluBlue">Kết quả</h2>
    <div id="sign-result" class="mt-6 text-slate-500">Chưa có dữ liệu.</div>
  </div>
</section>

<script>
const textDiv = document.getElementById('text-input');
const fileDiv = document.getElementById('file-input');
const textArea = document.querySelector('textarea[name="message_text"]');
const fileInput = document.querySelector('input[name="message_file"]');

document.querySelectorAll('input[name="input_mode"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    if (e.target.value === 'text') {
      textDiv.classList.remove('hidden'); fileDiv.classList.add('hidden'); fileInput.value = '';
    } else {
      textDiv.classList.add('hidden'); fileDiv.classList.remove('hidden'); textArea.value = '';
    }
  });
});

document.getElementById('sign-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const result = document.getElementById('sign-result');
  result.innerHTML = `<div class="text-tluBlue"><i class="fa-solid fa-circle-notch animate-spin"></i> Đang xử lý...</div>`;

  const formData = new FormData(e.target);

  try {
    const res = await fetch('/api/sign', { method: 'POST', body: formData });
    const data = await res.json();

    if (!res.ok || !data.success) {
      result.innerHTML = `<div class="text-red-500 mt-4">${data.error}</div>`;
      return;
    }

    result.innerHTML = `
    <div class="mt-4 p-5 bg-emerald-50 rounded-2xl border border-emerald-100">
      <p class="font-bold text-lg text-emerald-800">✔ Thành công</p>

      <div class="text-[12px] mt-3 font-mono bg-white/50 p-3 rounded-lg break-all space-y-1 text-slate-700">
        <p><strong>Kích thước chữ ký:</strong> ${data.signature_size} bytes</p>
        <p><strong>Thời gian ký:</strong> ${data.sign_time_ms} ms</p>
        <p><strong>Digest:</strong> ${data.integrity_digest_hex.substring(0, 30)}...</p>
        <p><strong>Key ID:</strong><br>${data.artifact.signatures.map(s => `- ${s.alg}: ${s.kid}`).join('<br>')}</p>
      </div>

      <div class="flex gap-3 mt-5">
        <a href="${data.download_url}" download class="flex-1 bg-tluBlue text-white px-4 py-3 rounded-xl text-center text-sm font-bold hover:bg-tluBlue2 transition">
          <i class="fa-solid fa-file-signature mr-2"></i>Tải Chữ ký
        </a>
        <a href="${data.download_pub_url}" download class="flex-1 bg-emerald-600 text-white px-4 py-3 rounded-xl text-center text-sm font-bold hover:bg-emerald-700 transition">
          <i class="fa-solid fa-key mr-2"></i>Tải Public Key
        </a>
      </div>
    </div>`;
  } catch (err) {
    result.innerHTML = `<div class="text-red-500">Lỗi kết nối máy chủ</div>`;
  }
});
</script>
{% endblock %}
