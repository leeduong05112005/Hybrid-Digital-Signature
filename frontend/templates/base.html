<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ app_name }} | Đại học Thăng Long{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            tluBlue: '#032a67', tluBlue2: '#0d4b9d', tluBlue3: '#113d80', tluRed: '#d8232a', tluLight: '#f5f7fb'
          },
          boxShadow: { soft: '0 18px 48px rgba(5,43,102,.12)' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Be Vietnam Pro', sans-serif; background: #f3f5f8; }
    .nav-item { position: relative; }
    .nav-item:after { content:''; position:absolute; left:0; bottom:-8px; width:0; height:2px; background:#d8232a; transition:.25s ease; }
    .nav-item:hover:after, .nav-item.active:after { width:100%; }
  </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-6 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
      <div class="flex items-center gap-3 md:gap-4 min-w-0 flex-1">
        <div class="min-w-0">
          <p class="text-2xl md:text-3xl font-extrabold text-tluBlue leading-none">{{ app_name }}</p>
        </div>
      </div>
    </div>
    <nav class="max-w-7xl mx-auto px-6 pb-4 flex flex-wrap gap-x-8 gap-y-3 text-sm font-semibold text-slate-700">
      <a href="{{ url_for('sign_page') }}" class="nav-item {% if request.path == '/sign' or request.path == '/' %}active{% endif %}">Sinh chữ ký</a>
      <a href="{{ url_for('verify_page') }}" class="nav-item {% if request.path == '/verify' %}active{% endif %}">Xác thực chữ ký</a>
    </nav>
  </header>

  <main class="flex-1 max-w-7xl w-full mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
